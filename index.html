<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KPSTI AR with YouTube</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    a-scene {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets/targets.mind;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <!-- PRELOAD MODEL -->
  <a-assets>
    <a-asset-item id="model" src="models/model.glb"></a-asset-item>
  </a-assets>

  <!-- CAMERA + CURSOR -->
  <a-camera position="0 0 0" look-controls="enabled: false">
    <a-cursor></a-cursor>
  </a-camera>

  <!-- MARKER -->
  <a-entity mindar-image-target="targetIndex: 0" mindar-stable="true">

    <!-- 3D MODEL -->
    <a-gltf-model 
      src="#model"
      position="0 0 -0.5"
      scale="0.5 0.5 0.5"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
    </a-gltf-model>

    <!-- TEXT -->
    <a-text 
      value="KPSTI Info"
      position="0 0.6 0"
      align="center"
      color="#ffffff">
    </a-text>

    <!-- YOUTUBE BUTTON -->
    <a-plane 
      id="ytButton"
      color="blue"
      position="0 -0.5 0"
      width="0.7"
      height="0.3"
      text="value: Watch Video; align: center"
      class="clickable">
    </a-plane>

  </a-entity>

</a-scene>

<!-- CLICK SCRIPT -->
<script>
document.querySelector('#ytButton').addEventListener('click', function () {
  window.open('https://www.youtube.com/watch?v=hWgH44u9-aE&list=RDhWgH44u9-aE&start_radio=1', '_blank');
});
</script>

</body>
</html>
