<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Video Play</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    a-scene {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets/targets.mind;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <!-- ASSETS -->
  <a-assets>
    <a-asset-item id="model" src="models/model.glb"></a-asset-item>

    <!-- YOUR VIDEO FILE -->
    <video id="video" src="video.mp4" preload="auto" crossorigin="anonymous"></video>
  </a-assets>

  <!-- CAMERA -->
  <a-camera position="0 0 0" look-controls="enabled: false">
    <a-cursor></a-cursor>
  </a-camera>

  <!-- MARKER -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 3D MODEL -->
    <a-gltf-model 
      src="#model"
      position="0 0 -0.5"
      scale="0.5 0.5 0.5">
    </a-gltf-model>

    <!-- VIDEO (HIDDEN FIRST) -->
    <a-video 
      id="videoPlane"
      src="#video"
      position="0 0 -0.5"
      width="1"
      height="0.6"
      visible="false">
    </a-video>

    <!-- BUTTON -->
    <a-plane 
      id="playButton"
      color="blue"
      position="0 -0.5 0"
      width="0.7"
      height="0.3"
      text="value: Play Video; align: center">
    </a-plane>

  </a-entity>

</a-scene>

<script>
const video = document.querySelector('#video');
const videoPlane = document.querySelector('#videoPlane');
const button = document.querySelector('#playButton');

// When button clicked
button.addEventListener('click', function () {

  // Show video
  videoPlane.setAttribute('visible', true);

  // Hide model (optional)
  document.querySelector('[gltf-model]').setAttribute('visible', false);

  // Play video
  video.play();

});
</script>

</body>
</html>
